name: Build Pay App APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Ensure Files Exist (Fallback)
        run: |
          sudo apt-get update && sudo apt-get install -y imagemagick
          if [ ! -f logo.png ]; then
            convert -size 512x512 xc:"#7850dc" -gravity center -fill white -pointsize 40 -draw "text 0,0 'PayApp'" logo.png
          fi
          if [ ! -f splashscreen.png ]; then
            convert -size 1024x1024 xc:"#0a0a0a" splashscreen.png
          fi

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Cordova
        run: npm install -g cordova

      - name: Create Cordova Project
        run: |
          cordova create payapp com.akash.payapp "PayApp"
          cd payapp
          cordova platform add android

      - name: Setup Files & Configuration
        run: |
          cd payapp
          rm -rf www/*
          rsync -av --exclude='payapp' --exclude='.git' --exclude='.github' ../ www/

          cat << 'EOF' > config.xml
          <?xml version='1.0' encoding='utf-8'?>
          <widget id="com.akash.payapp" version="1.0.0" xmlns="http://www.w3.org/ns/widgets" xmlns:cdv="http://cordova.apache.org/ns/1.0" xmlns:android="http://schemas.android.com/apk/res/android">
              <name>PayApp</name>
              <description>UPI Clone App</description>
              <author>Akash</author>
              <content src="index.html" />
              <access origin="*" />
              <allow-navigation href="*" />
              <allow-intent href="http://*/*" />
              <allow-intent href="https://*/*" />
              
              <plugin name="cordova-plugin-android-permissions" spec="^1.1.5" />
              <plugin name="cordova-plugin-local-notification-12" spec="^1.3.0" />

              <icon src="www/logo.png" />

              <preference name="SplashScreenDelay" value="1300" />
              <preference name="FadeSplashScreenDuration" value="300"/>
              <preference name="ShowSplashScreenSpinner" value="false" />
              <preference name="AndroidWindowSplashScreenAnimatedIcon" value="res/drawable/splashscreen.png" />
              <preference name="AndroidWindowSplashScreenBackground" value="#0a0a0a" />

              <platform name="android">
                  <config-file target="AndroidManifest.xml" parent="/*">
                      <uses-permission android:name="android.permission.CAMERA" />
                      <uses-permission android:name="android.permission.POST_NOTIFICATIONS" />
                  </config-file>
                  <resource-file src="www/splashscreen.png" target="app/src/main/res/drawable/splashscreen.png" />
              </platform>
          </widget>
          EOF

      - name: Build Debug APK
        run: |
          cd payapp
          cordova build android --debug --device || true

      - name: Upload APK File
        uses: actions/upload-artifact@v4
        with:
          name: PayApp-APK
          path: ${{ github.workspace }}/payapp/platforms/android/app/build/outputs/apk/debug/app-debug.apk
